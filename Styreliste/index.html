<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styreliste Beregner — Induminati</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F0F6F8;
    --surface: #ffffff;
    --surface2: #E6F4F7;
    --border: #C8DDE4;
    --accent: #005F7F;
    --text: #1A3A4A;
    --text-dim: #5A7A88;
    --red: #cc2222;
    --green: #1a7a3a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  header {
    width: 100%;
    max-width: 860px;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  header span {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .layout {
    width: 100%;
    max-width: 860px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
    align-items: start;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
  }

  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .field {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: #005F7F;
    background: #f0f0f0;
  }

  .unit {
    display: inline-block;
    font-size: 0.65rem;
    color: var(--accent);
    margin-left: 4px;
  }

  .btn {
    width: 100%;
    background: #005F7F;
    color: #ffffff;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    padding: 14px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 8px;
  }

  .btn:hover { background: #00A0C0; }
  .btn:active { transform: scale(0.98); }

  .error-msg {
    font-size: 0.72rem;
    color: var(--red);
    margin-top: 12px;
    min-height: 1em;
    letter-spacing: 0.5px;
  }

  /* Output panel */
  .output-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
  }

  .diagram-wrap {
    width: 100%;
    background: #fafafa;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 10px;
    min-height: 200px;
    margin-bottom: 20px;
    overflow-x: auto;
  }

  svg { display: block; }

  .measurements-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }

  .measurements-table th {
    text-align: left;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }

  .measurements-table td {
    padding: 9px 10px;
    border-bottom: 1px solid #e8e8e8;
    font-weight: 500;
  }

  .measurements-table tr:last-child td { border-bottom: none; }

  .measurements-table td:last-child {
    color: #1a1a1a;
    font-weight: 700;
    text-align: right;
  }

  .placeholder {
    color: var(--text-dim);
    font-size: 0.8rem;
    text-align: center;
    padding: 40px 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .badge {
    display: inline-block;
    font-size: 0.65rem;
    padding: 2px 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-left: 8px;
    vertical-align: middle;
  }

  .btn-print {
    background: #ffffff;
    color: #1a1a1a;
    border: 1px solid #cccccc;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-print:hover { background: #f0f0f0; border-color: #999; }

  @media print {
    body * { visibility: hidden; }
    #printArea, #printArea * { visibility: visible; }
    #printArea {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  }

  .btn-home {
    display: inline-flex; align-items: center; gap: 6px;
    color: #5A7A88; text-decoration: none; font-size: 12px; font-weight: 500;
    padding: 5px 10px; border: 1px solid #C8DDE4; border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace; letter-spacing: .5px;
    transition: color .15s, border-color .15s;
  }
  .btn-home:hover { color: #005F7F; border-color: #005F7F; }
</style>
</head>
<body>

<header>
  <h1>Styreliste Beregner</h1>
  <span>Transportbånd Layout Værktøj</span>
  <a class="btn-home" href="../index.html" style="margin-left:auto">← Forside</a>
</header>

<div class="layout">

  <!-- Input panel -->
  <div class="panel">
    <div class="panel-title">Parametre</div>

    <div class="field">
      <label>Båndbredde <span class="unit">mm</span></label>
      <input type="number" id="beltWidth" min="1" step="0.1" placeholder="0">
    </div>

    <div class="field">
      <label>Antal Styrelister</label>
      <input type="number" id="numGuides" min="1" max="20" step="1" placeholder="0">
    </div>

    <div class="field">
      <label>Styrelistebredde <span class="unit">mm</span></label>
      <input type="number" id="guideWidth" min="0.1" step="0.1" placeholder="0">
    </div>

    <div class="field">
      <label>Center-til-Center <span class="unit">mm</span></label>
      <input type="number" id="cc" min="0" step="0.1" placeholder="0">
    </div>

    <button class="btn" onclick="calculate()">Beregn</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Output panel -->
  <div class="output-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border)">
      <span style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase">Diagram</span>
      <button class="btn-print" onclick="printDiagram()" id="printBtn" style="display:none">🖨 Print diagram</button>
    </div>
    <div id="printArea">
    <div class="diagram-wrap" id="diagramWrap">
      <div class="placeholder">Indtast parametre og tryk beregn</div>
    </div>
    </div>

    <div id="tableWrap"></div>
  </div>

</div>

<script>
function calculate() {
  const beltWidth = parseFloat(document.getElementById('beltWidth').value);
  const numGuides = parseInt(document.getElementById('numGuides').value);
  const guideWidth = parseFloat(document.getElementById('guideWidth').value);
  const cc = parseFloat(document.getElementById('cc').value);
  const errEl = document.getElementById('errorMsg');
  errEl.textContent = '';

  // Validation
  if (isNaN(beltWidth) || beltWidth <= 0) { errEl.textContent = 'Ugyldig båndbredde.'; return; }
  if (isNaN(numGuides) || numGuides < 1) { errEl.textContent = 'Ugyldigt antal styrelister.'; return; }
  if (isNaN(guideWidth) || guideWidth <= 0) { errEl.textContent = 'Ugyldig styrelistebredde.'; return; }
  if (isNaN(cc) || cc < 0) { errEl.textContent = 'Ugyldig C-C værdi.'; return; }

  // Belt center
  const beltCenter = beltWidth / 2;

  // Calculate guide center positions
  // Guides are symmetrically placed around belt center with cc spacing
  let guideCenters = [];
  if (numGuides === 1) {
    guideCenters = [cc]; // cc = distance from belt edge to guide center
  } else {
    // For multiple guides: they are spaced cc apart, centered on belt
    const totalSpan = (numGuides - 1) * cc;
    const firstGuideCenter = beltCenter - totalSpan / 2;
    for (let i = 0; i < numGuides; i++) {
      guideCenters.push(firstGuideCenter + i * cc);
    }
  }

  // Check fit
  let valid = true;
  for (const gc of guideCenters) {
    if (gc - guideWidth / 2 < 0 || gc + guideWidth / 2 > beltWidth) {
      valid = false;
    }
  }
  if (!valid) {
    errEl.textContent = 'Advarsel: en eller flere styrelister falder uden for båndbredden.';
  }

  renderDiagram(beltWidth, numGuides, guideWidth, cc, guideCenters, valid);
  renderTable(beltWidth, numGuides, guideWidth, cc, guideCenters, valid);
  document.getElementById('printBtn').style.display = 'inline-block';
}

function renderDiagram(beltWidth, numGuides, guideWidth, cc, guideCenters, valid) {
  const wrap = document.getElementById('diagramWrap');

  // SVG dimensions
  const svgW = 700;
  const PAD_LEFT = 30;
  const PAD_RIGHT = 30;
  const drawW = svgW - PAD_LEFT - PAD_RIGHT;
  const scale = drawW / beltWidth;

  const beltH = 60;
  const beltY = 80;
  const svgH = beltY + beltH + 100;

  const beltX = PAD_LEFT;
  const beltRight = beltX + drawW;
  const beltCenterX = beltX + drawW / 2;

  // Colors - print friendly light theme
  const C_BELT = '#d8d8d8';
  const C_BELT_STRIPE = '#c8c8c8';
  const C_GUIDE = '#444444';
  const C_GUIDE_EDGE = '#222222';
  const C_DIM_LINE = '#444444';
  const C_DIM_TEXT = '#333333';
  const C_DIM_ACCENT = '#1a1a1a';
  const C_TEXT = '#1a1a1a';

  const guideElements = [];
  const dimElements = [];

  // Build guide rects
  for (const gc of guideCenters) {
    const gx = beltX + gc * scale;
    const gw = guideWidth * scale;
    guideElements.push(`
      <rect x="${gx - gw/2}" y="${beltY - 8}" width="${gw}" height="${beltH + 16}" 
            fill="${valid ? C_GUIDE : '#cc2222'}" opacity="0.85" rx="1"/>
      <rect x="${gx - gw/2}" y="${beltY - 8}" width="${gw}" height="3" 
            fill="${valid ? '#111111' : '#991111'}" rx="1"/>
    `);
  }

  // Dimension lines - bottom row
  const dimY1 = beltY + beltH + 22;
  const dimY2 = beltY + beltH + 48;
  const tickH = 6;

  function dimLine(x1, x2, y, label, color, yLabel) {
    const mid = (x1 + x2) / 2;
    const yLbl = yLabel || y - 8;
    return `
      <line x1="${x1}" y1="${y - tickH}" x2="${x1}" y2="${y + tickH}" stroke="${color}" stroke-width="1.2"/>
      <line x1="${x2}" y1="${y - tickH}" x2="${x2}" y2="${y + tickH}" stroke="${color}" stroke-width="1.2"/>
      <line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${color}" stroke-width="1.2" stroke-dasharray="none"/>
      <polygon points="${x1},${y} ${x1+7},${y-3} ${x1+7},${y+3}" fill="${color}"/>
      <polygon points="${x2},${y} ${x2-7},${y-3} ${x2-7},${y+3}" fill="${color}"/>
      <text x="${mid}" y="${yLbl}" text-anchor="middle" font-family="IBM Plex Mono,monospace" 
            font-size="11" font-weight="600" fill="${color}">${label}</text>
    `;
  }

  // --- Dimension: belt edge to left guide edge
  const leftGuideEdge = beltX + (guideCenters[0] - guideWidth / 2) * scale;
  const leftGuideCenter = beltX + guideCenters[0] * scale;
  const rightGuideCenter = beltX + guideCenters[numGuides - 1] * scale;
  const rightGuideEdge = beltX + (guideCenters[numGuides - 1] + guideWidth / 2) * scale;

  const edgeToLeftEdgeMM = guideCenters[0] - guideWidth / 2;
  const rightEdgeToEndMM = beltWidth - guideCenters[numGuides - 1] - guideWidth / 2;

  let dims = '';

  // Row 1 dims (dimY1): edge → left guide edge, right guide edge → belt end
  dims += dimLine(beltX, leftGuideEdge, dimY1, fmt(edgeToLeftEdgeMM), C_DIM_ACCENT, dimY1 - 9);
  dims += dimLine(rightGuideEdge, beltRight, dimY1, fmt(rightEdgeToEndMM), C_DIM_ACCENT, dimY1 - 9);

  // Guide width markers (inline on belt)
  for (const gc of guideCenters) {
    const gx = beltX + gc * scale;
    const gw = guideWidth * scale;
    dims += `
      <line x1="${gx - gw/2}" y1="${beltY - 14}" x2="${gx - gw/2}" y2="${beltY - 20}" stroke="${C_DIM_LINE}" stroke-width="1"/>
      <line x1="${gx + gw/2}" y1="${beltY - 14}" x2="${gx + gw/2}" y2="${beltY - 20}" stroke="${C_DIM_LINE}" stroke-width="1"/>
      <line x1="${gx - gw/2}" y1="${beltY - 17}" x2="${gx + gw/2}" y2="${beltY - 17}" stroke="${C_DIM_LINE}" stroke-width="1"/>
      <text x="${gx}" y="${beltY - 22}" text-anchor="middle" font-family="IBM Plex Mono,monospace" 
            font-size="9.5" fill="${C_DIM_LINE}">⌀${fmt(guideWidth)}</text>
    `;
  }

  // CC dimensions between guides (if multiple)
  if (numGuides > 1) {
    for (let i = 0; i < numGuides - 1; i++) {
      const x1 = beltX + guideCenters[i] * scale;
      const x2 = beltX + guideCenters[i + 1] * scale;
      dims += dimLine(x1, x2, dimY2, `CC ${fmt(cc)}`, '#555555', dimY2 - 9);
    }
  }

  // Belt center line removed

  // Belt total width dim (top)
  const topDimY = beltY - 38;
  const topDim = `
    <line x1="${beltX}" y1="${topDimY - 6}" x2="${beltX}" y2="${topDimY + 6}" stroke="${C_DIM_LINE}" stroke-width="1.2"/>
    <line x1="${beltRight}" y1="${topDimY - 6}" x2="${beltRight}" y2="${topDimY + 6}" stroke="${C_DIM_LINE}" stroke-width="1.2"/>
    <line x1="${beltX}" y1="${topDimY}" x2="${beltRight}" y2="${topDimY}" stroke="${C_DIM_LINE}" stroke-width="1.2"/>
    <polygon points="${beltX},${topDimY} ${beltX+7},${topDimY-3} ${beltX+7},${topDimY+3}" fill="${C_DIM_LINE}"/>
    <polygon points="${beltRight},${topDimY} ${beltRight-7},${topDimY-3} ${beltRight-7},${topDimY+3}" fill="${C_DIM_LINE}"/>
    <text x="${beltCenterX}" y="${topDimY - 8}" text-anchor="middle" font-family="IBM Plex Mono,monospace" 
          font-size="11" font-weight="600" fill="${C_DIM_LINE}">BÅND ${fmt(beltWidth)} mm</text>
  `;

  // Belt striped pattern
  let stripes = '';
  for (let i = 0; i < 8; i++) {
    const sx = beltX + (drawW / 8) * i;
    stripes += `<line x1="${sx}" y1="${beltY}" x2="${sx}" y2="${beltY + beltH}" stroke="${C_BELT_STRIPE}" stroke-width="0.8"/>`;
  }

  const svg = `
  <svg width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="beltPattern" width="24" height="${beltH}" patternUnits="userSpaceOnUse">
        <rect width="24" height="${beltH}" fill="${C_BELT}"/>
        <line x1="0" y1="0" x2="24" y2="${beltH}" stroke="#c0c0c0" stroke-width="1"/>
      </pattern>
    </defs>
    <!-- Belt body -->
    <rect x="${beltX}" y="${beltY}" width="${drawW}" height="${beltH}" fill="url(#beltPattern)" rx="3"/>
    <!-- Belt top edge highlight -->
    <rect x="${beltX}" y="${beltY}" width="${drawW}" height="4" fill="#bbbbbb" rx="2"/>
    <!-- Belt border -->
    <rect x="${beltX}" y="${beltY}" width="${drawW}" height="${beltH}" fill="none" stroke="#999" stroke-width="1.5" rx="3"/>

    ${guideElements.join('')}
    ${topDim}
    ${dims}
  </svg>`;

  wrap.innerHTML = svg;
}

function renderTable(beltWidth, numGuides, guideWidth, cc, guideCenters, valid) {
  const tableWrap = document.getElementById('tableWrap');

  const statusBadge = valid
    ? `<span class="badge ok">OK</span>`
    : `<span class="badge warn">Uden for bånd</span>`;

  let rows = '';

  // Båndkant til første styreliste venstre kant
  const edgeToFirstEdge = guideCenters[0] - guideWidth / 2;
  rows += `<tr><td>Båndkant → Styreliste 1 venstre kant</td><td>${fmt(edgeToFirstEdge)} mm</td></tr>`;

  // Center position for each guide
  for (let i = 0; i < numGuides; i++) {
    if (numGuides > 1) {
      rows += `<tr><td>Styreliste ${i+1} centerposition</td><td>${fmt(guideCenters[i])} mm</td></tr>`;
    } else {
      rows += `<tr><td>Styreliste centerposition</td><td>${fmt(guideCenters[i])} mm</td></tr>`;
    }
  }

  // CC between guides
  if (numGuides > 1) {
    rows += `<tr><td>C-C afstand</td><td>${fmt(cc)} mm</td></tr>`;
  }

  // Guide width
  rows += `<tr><td>Styrelistebredde</td><td>${fmt(guideWidth)} mm</td></tr>`;

  // Last guide right edge to belt end
  const lastGuideRightEdge = guideCenters[numGuides - 1] + guideWidth / 2;
  const rightEdgeToEnd = beltWidth - lastGuideRightEdge;
  rows += `<tr><td>Styreliste ${numGuides} højre kant → Båndkant</td><td>${fmt(rightEdgeToEnd)} mm</td></tr>`;

  tableWrap.innerHTML = `
    <div style="display:flex;align-items:center;margin-bottom:12px;padding-top:4px">
      <span style="font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:1rem;color:var(--text-dim)">Mål</span>
      ${statusBadge}
    </div>
    <table class="measurements-table">
      <thead><tr><th>Beskrivelse</th><th style="text-align:right">Værdi</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function printDiagram() {
  window.print();
}

function fmt(n) {
  if (isNaN(n)) return '—';
  return Number(n.toFixed(3)).toString();
}

// Calculate on Enter key
document.querySelectorAll('input').forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); }));
</script>
</body>
</html>
