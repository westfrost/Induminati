<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styreliste Beregner — Induminati</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #F3F7FA;
    --surface:      #FFFFFF;
    --surface2:     #E5F1FA;
    --border:       #D7E3EC;
    --dark:         #0B4F79;
    --accent:       #E8791E;
    --accent-hover: #C9640F;
    --text:         #17324A;
    --muted:        #5F7C90;
    --red:          #D64545;
    --green:        #2E9E52;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── Header ── */
  header {
    background: var(--dark);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .logo-icon { width: 34px; height: 34px; background: var(--accent); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-icon svg { width: 20px; height: 20px; }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 1px;
    color: #fff;
    line-height: 1;
    flex: 1;
  }

  header .sub {
    font-size: 0.72rem;
    color: #B9D8EA;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-left: 10px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .btn-home {
    display: inline-flex; align-items: center; gap: 5px;
    color: #CFE3EE; text-decoration: none; font-size: 0.72rem;
    font-weight: 600; padding: 6px 10px; border: 1px solid rgba(255,255,255,.3);
    border-radius: 5px; letter-spacing: .5px; white-space: nowrap;
    transition: color .15s, border-color .15s;
  }
  .btn-home:hover { color: #fff; border-color: var(--accent); }

  /* ── Layout ── */
  .layout {
    width: 100%;
    max-width: 960px;
    margin: 32px auto 0;
    padding: 0 20px;
    display: grid;
    grid-template-columns: 270px 1fr;
    gap: 22px;
    align-items: start;
  }

  @media (max-width: 680px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* ── Panels ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 22px;
  }

  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 18px;
    padding-bottom: 9px;
    border-bottom: 1px solid var(--border);
  }

  .field { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.05rem;
    font-weight: 600;
    padding: 9px 11px;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { border-color: var(--dark); background: #fff; }

  .field-hint {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: .3px;
    line-height: 1.4;
  }

  .btn {
    width: 100%;
    background: var(--dark);
    color: #fff;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem;
    letter-spacing: 2px;
    padding: 13px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 6px;
  }
  .btn:hover { background: var(--accent); }
  .btn:active { transform: scale(0.98); }

  .btn-print {
    width: 100%;
    background: var(--surface);
    color: var(--dark);
    border: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: .5px;
    padding: 8px 14px;
    cursor: pointer;
    margin-top: 10px;
    display: none;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-print:hover { background: var(--surface2); border-color: var(--dark); }

  .error-msg {
    font-size: 0.7rem;
    color: var(--red);
    margin-top: 10px;
    min-height: 1em;
    letter-spacing: 0.3px;
    line-height: 1.5;
  }

  /* ── Output ── */
  .output-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 22px;
  }

  .diagram-wrap {
    width: 100%;
    background: #F7FAFC;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px 8px;
    min-height: 220px;
    margin-bottom: 22px;
    overflow-x: auto;
  }

  svg { display: block; }

  .placeholder {
    color: var(--muted);
    font-size: 0.78rem;
    text-align: center;
    padding: 40px 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Table ── */
  .table-section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 7px;
    border-bottom: 1px solid var(--border);
  }

  .measurements-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
    margin-bottom: 18px;
  }

  .measurements-table th {
    text-align: left;
    font-size: 0.62rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .measurements-table td {
    padding: 8px 10px;
    border-bottom: 1px solid #E9EFF5;
    font-weight: 500;
  }

  .measurements-table td:last-child {
    font-weight: 700;
    text-align: right;
    color: var(--dark);
  }

  .measurements-table tr.highlight td {
    background: var(--surface2);
    color: var(--dark);
  }

  .measurements-table tr.highlight td:last-child {
    color: var(--dark);
  }

  .measurements-table tr.warn td {
    background: rgba(214,69,69,.08);
    color: var(--red);
  }

  .measurements-table tr.warn td:last-child {
    color: var(--red);
  }

  .measurements-table tr:last-child td { border-bottom: none; }

  .badge {
    display: inline-block;
    font-size: 0.6rem;
    padding: 2px 7px;
    border-radius: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-left: 8px;
    vertical-align: middle;
  }
  .badge.ok   { background: rgba(46,158,82,.12);  border: 1px solid rgba(46,158,82,.3);  color: var(--green); }
  .badge.warn { background: rgba(214,69,69,.1);   border: 1px solid rgba(214,69,69,.3);   color: var(--red); }

  @media print {
    body * { visibility: hidden; }
    #printArea, #printArea * { visibility: visible; }
    #printArea { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">
    <svg viewBox="0 0 20 20" fill="none">
      <rect x="1" y="7" width="18" height="6" rx="3" fill="white" opacity="0.9"/>
      <circle cx="4" cy="10" r="2.5" fill="white"/>
      <circle cx="16" cy="10" r="2.5" fill="white"/>
      <rect x="3" y="9" width="14" height="2" fill="#0B4F79"/>
    </svg>
  </div>
  <h1>Styreliste Beregner<span class="sub">Transportbånd layout</span></h1>
  <a class="btn-home" href="../index.html">← Forside</a>
</header>

<div class="layout">

  <!-- Input -->
  <div class="panel">
    <div class="panel-title">Parametre</div>

    <div class="field">
      <label>Båndbredde <span style="color:var(--dark)">mm</span></label>
      <input type="number" id="beltWidth" min="1" placeholder="fx 500">
    </div>

    <div class="field">
      <label>Antal styrelister</label>
      <input type="number" id="numGuides" min="1" max="20" placeholder="fx 2">
    </div>

    <div class="field">
      <label>Styrelistebredde <span style="color:var(--dark)">mm</span></label>
      <input type="number" id="guideWidth" min="1" placeholder="fx 20">
    </div>

    <div class="field">
      <label id="ccLabel">C/C afstand <span style="color:var(--dark)">mm</span></label>
      <input type="number" id="cc" min="0" placeholder="fx 100">
      <div class="field-hint" id="ccHint">Center-til-center afstand mellem styrelisterne</div>
    </div>

    <button class="btn" onclick="calculate()">Beregn</button>
    <button class="btn-print" id="printBtn" onclick="doPrint()">⎙ Udskriv diagram</button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Output -->
  <div class="output-panel">
    <div id="printArea">
      <div class="diagram-wrap" id="diagramWrap">
        <div class="placeholder">Indtast parametre og tryk beregn</div>
      </div>
    </div>
    <div id="tableWrap"></div>
  </div>

</div>

<script>
// ── Update label based on numGuides ──────────────────────────────────────────
document.getElementById('numGuides').addEventListener('input', updateCCLabel);

function updateCCLabel() {
  const n = parseInt(document.getElementById('numGuides').value) || 0;
  const lbl  = document.getElementById('ccLabel');
  const hint = document.getElementById('ccHint');
  if (n <= 1) {
    lbl.innerHTML  = 'Kant til båndkant <span style="color:var(--dark)">mm</span>';
    hint.textContent = 'Afstand fra båndkant til styrelistekant — lad stå tomt for at centrere';
  } else {
    lbl.innerHTML  = 'C/C afstand <span style="color:var(--dark)">mm</span>';
    hint.textContent = 'Center-til-center afstand mellem styrelisterne';
  }
}

// ── Main calculation ─────────────────────────────────────────────────────────
function calculate() {
  const beltWidth  = parseFloat(document.getElementById('beltWidth').value);
  const numGuides  = parseInt(document.getElementById('numGuides').value);
  const guideWidth = parseFloat(document.getElementById('guideWidth').value);
  const ccVal      = parseFloat(document.getElementById('cc').value);
  const errEl      = document.getElementById('errorMsg');
  errEl.textContent = '';

  if (isNaN(beltWidth)  || beltWidth  <= 0) { errEl.textContent = 'Ugyldig båndbredde.';        return; }
  if (isNaN(numGuides)  || numGuides  <  1) { errEl.textContent = 'Ugyldigt antal styrelister.'; return; }
  if (isNaN(guideWidth) || guideWidth <= 0) { errEl.textContent = 'Ugyldig styrelistebredde.';   return; }
  if (numGuides > 1 && (isNaN(ccVal) || ccVal <= 0)) { errEl.textContent = 'Ugyldig C/C afstand.'; return; }

  const beltCenter = beltWidth / 2;
  let guideCenters = [];

  if (numGuides === 1) {
    // If cc field is empty, place guide in center
    if (isNaN(ccVal) || document.getElementById('cc').value === '') {
      const center = beltWidth / 2;
      guideCenters = [center];
    } else {
      // ccVal = distance from belt edge to guide EDGE → convert to center
      const center = ccVal + guideWidth / 2;
      guideCenters = [center];
    }
  } else {
    // ccVal = center-to-center between adjacent guides, symmetric around belt center
    const totalSpan    = (numGuides - 1) * ccVal;
    const firstCenter  = beltCenter - totalSpan / 2;
    for (let i = 0; i < numGuides; i++) {
      guideCenters.push(firstCenter + i * ccVal);
    }
  }

  // Validate
  let valid = true;
  for (const gc of guideCenters) {
    if (gc - guideWidth / 2 < 0 || gc + guideWidth / 2 > beltWidth) valid = false;
  }
  // Check overlap between guides
  let overlap = false;
  for (let i = 0; i < guideCenters.length - 1; i++) {
    const gap = guideCenters[i + 1] - guideCenters[i] - guideWidth;
    if (gap < 0) overlap = true;
  }

  if (!valid) errEl.textContent = 'Advarsel: en eller flere styrelister rager uden for båndet.';
  if (overlap) errEl.textContent = 'Advarsel: styrelister overlapper hinanden.';

  renderDiagram(beltWidth, numGuides, guideWidth, ccVal, guideCenters, valid, overlap);
  renderTable(beltWidth, numGuides, guideWidth, ccVal, guideCenters, valid, overlap);
  document.getElementById('printBtn').style.display = 'block';
}

// ── Diagram ──────────────────────────────────────────────────────────────────
function renderDiagram(beltWidth, numGuides, guideWidth, ccVal, guideCenters, valid, overlap) {
  const wrap   = document.getElementById('diagramWrap');
  const SVG_W  = 720;
  const PAD_L  = 36; const PAD_R = 36;
  const drawW  = SVG_W - PAD_L - PAD_R;
  const scale  = drawW / beltWidth;
  const beltH  = 56;
  const beltY  = 90;

  // Rows of dimension lines below belt
  const DIM_ROW1 = beltY + beltH + 28;  // edge margins + guide widths
  const DIM_ROW2 = DIM_ROW1 + 28;        // kant-til-kant
  const DIM_ROW3 = DIM_ROW2 + 28;        // C/C
  const SVG_H    = DIM_ROW3 + 36;

  const beltX    = PAD_L;
  const beltR    = beltX + drawW;
  const beltCx   = beltX + drawW / 2;

  const C_DARK   = '#0B4F79';
  const C_ACC    = '#E8791E';
  const C_DIM    = '#17324A';
  const C_KTK    = '#E8791E';   // kant-til-kant highlight colour
  const C_CC     = '#0B4F79';
  const C_MUTED  = '#5F7C90';
  const C_GUIDE  = valid && !overlap ? '#0B4F79' : '#D64545';
  const C_GUIDE_TOP = valid && !overlap ? '#073B57' : '#963030';

  // ── Belt ──
  const beltParts = `
    <defs>
      <pattern id="bp" width="20" height="${beltH}" patternUnits="userSpaceOnUse">
        <rect width="20" height="${beltH}" fill="#DCE6EE"/>
        <line x1="0" y1="0" x2="20" y2="${beltH}" stroke="#CBD9E3" stroke-width="1"/>
      </pattern>
    </defs>
    <rect x="${beltX}" y="${beltY}" width="${drawW}" height="${beltH}" fill="url(#bp)" rx="3"/>
    <rect x="${beltX}" y="${beltY}" width="${drawW}" height="4" fill="#AEC1CC" rx="2"/>
    <rect x="${beltX}" y="${beltY}" width="${drawW}" height="${beltH}" fill="none" stroke="#93A9B8" stroke-width="1.5" rx="3"/>
  `;

  // ── Guide rects ──
  let guides = '';
  for (const gc of guideCenters) {
    const gx = beltX + gc * scale;
    const gw = guideWidth * scale;
    guides += `
      <rect x="${gx - gw/2}" y="${beltY - 10}" width="${gw}" height="${beltH + 20}"
            fill="${C_GUIDE}" opacity="0.82" rx="1"/>
      <rect x="${gx - gw/2}" y="${beltY - 10}" width="${gw}" height="3"
            fill="${C_GUIDE_TOP}" rx="1"/>
    `;
  }

  // ── Helper functions ──
  const tx  = x => beltX + x * scale;

  function arrowLine(x1, x2, y, label, color, labelY) {
    if (Math.abs(x2 - x1) < 2) return '';
    const mx  = (x1 + x2) / 2;
    const ly  = labelY !== undefined ? labelY : y - 9;
    const aw  = 5;
    return `
      <line x1="${x1}" y1="${y-5}" x2="${x1}" y2="${y+5}" stroke="${color}" stroke-width="1.2"/>
      <line x1="${x2}" y1="${y-5}" x2="${x2}" y2="${y+5}" stroke="${color}" stroke-width="1.2"/>
      <line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${color}" stroke-width="1.2"/>
      <polygon points="${x1},${y} ${x1+aw},${y-2.5} ${x1+aw},${y+2.5}" fill="${color}"/>
      <polygon points="${x2},${y} ${x2-aw},${y-2.5} ${x2-aw},${y+2.5}" fill="${color}"/>
      <text x="${mx}" y="${ly}" text-anchor="middle"
            font-family="IBM Plex Mono,monospace" font-size="10.5" font-weight="600"
            fill="${color}">${label}</text>
    `;
  }

  // ── Top dim: total belt width ──
  const topY   = beltY - 36;
  const topDim = `
    <line x1="${beltX}" y1="${topY-5}" x2="${beltX}" y2="${topY+5}" stroke="${C_MUTED}" stroke-width="1.2"/>
    <line x1="${beltR}" y1="${topY-5}" x2="${beltR}" y2="${topY+5}" stroke="${C_MUTED}" stroke-width="1.2"/>
    <line x1="${beltX}" y1="${topY}" x2="${beltR}" y2="${topY}" stroke="${C_MUTED}" stroke-width="1.2"/>
    <polygon points="${beltX},${topY} ${beltX+5},${topY-2.5} ${beltX+5},${topY+2.5}" fill="${C_MUTED}"/>
    <polygon points="${beltR},${topY} ${beltR-5},${topY-2.5} ${beltR-5},${topY+2.5}" fill="${C_MUTED}"/>
    <text x="${beltCx}" y="${topY - 9}" text-anchor="middle"
          font-family="IBM Plex Mono,monospace" font-size="11" font-weight="600"
          fill="${C_MUTED}">BÅND ${fmt(beltWidth)} mm</text>
  `;

  // ── Guide width annotations (small ticks above each guide) ──
  let guideWidthAnnot = '';
  for (const gc of guideCenters) {
    const gx = tx(gc);
    const gw = guideWidth * scale;
    guideWidthAnnot += `
      <line x1="${gx-gw/2}" y1="${beltY-16}" x2="${gx-gw/2}" y2="${beltY-22}" stroke="${C_DIM}" stroke-width="1"/>
      <line x1="${gx+gw/2}" y1="${beltY-16}" x2="${gx+gw/2}" y2="${beltY-22}" stroke="${C_DIM}" stroke-width="1"/>
      <line x1="${gx-gw/2}" y1="${beltY-19}" x2="${gx+gw/2}" y2="${beltY-19}" stroke="${C_DIM}" stroke-width="1"/>
      <text x="${gx}" y="${beltY-24}" text-anchor="middle"
            font-family="IBM Plex Mono,monospace" font-size="9" fill="${C_DIM}">⌀${fmt(guideWidth)}</text>
    `;
  }

  // ── Row 1: edge → first guide left edge, last guide right edge → belt end ──
  const firstLeftEdge  = tx(guideCenters[0] - guideWidth / 2);
  const lastRightEdge  = tx(guideCenters[guideCenters.length - 1] + guideWidth / 2);
  const edgeToFirst    = guideCenters[0] - guideWidth / 2;
  const lastToEdge     = beltWidth - guideCenters[guideCenters.length - 1] - guideWidth / 2;

  let row1 = '';
  row1 += arrowLine(beltX, firstLeftEdge, DIM_ROW1, fmt(edgeToFirst) + ' mm', C_DIM);
  row1 += arrowLine(lastRightEdge, beltR, DIM_ROW1, fmt(lastToEdge) + ' mm', C_DIM);

  // ── Row 2: kant-til-kant between each pair of adjacent guides ──
  let row2 = '';
  let ktkLabel = '';
  if (numGuides > 1) {
    // Label left of diagram
    ktkLabel = `
      <text x="${beltX - 4}" y="${DIM_ROW2 + 4}" text-anchor="end"
            font-family="IBM Plex Mono,monospace" font-size="9" fill="${C_KTK}"
            font-weight="600">K/K</text>
    `;
    for (let i = 0; i < guideCenters.length - 1; i++) {
      const x1  = tx(guideCenters[i] + guideWidth / 2);
      const x2  = tx(guideCenters[i + 1] - guideWidth / 2);
      const ktk = guideCenters[i + 1] - guideCenters[i] - guideWidth;
      row2 += arrowLine(x1, x2, DIM_ROW2, fmt(ktk) + ' mm', C_KTK);
    }
  } else {
    // For single guide: show distance from each edge to belt edge (already in row1)
    // Show guide center position instead
    const cx = tx(guideCenters[0]);
    ktkLabel = '';
    row2 = `
      <line x1="${cx}" y1="${beltY - 10}" x2="${cx}" y2="${DIM_ROW2}" stroke="${C_ACC}" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="${cx}" y="${DIM_ROW2 + 4}" text-anchor="middle"
            font-family="IBM Plex Mono,monospace" font-size="10" font-weight="600"
            fill="${C_ACC}">Center: ${fmt(guideCenters[0])} mm</text>
    `;
  }

  // ── Row 3: C/C between each pair of adjacent guides ──
  let row3 = '';
  let ccLabel = '';
  if (numGuides > 1) {
    ccLabel = `
      <text x="${beltX - 4}" y="${DIM_ROW3 + 4}" text-anchor="end"
            font-family="IBM Plex Mono,monospace" font-size="9" fill="${C_CC}"
            font-weight="600">C/C</text>
    `;
    for (let i = 0; i < guideCenters.length - 1; i++) {
      const x1 = tx(guideCenters[i]);
      const x2 = tx(guideCenters[i + 1]);
      // Draw center lines up through guides
      row3 += `
        <line x1="${x1}" y1="${beltY}" x2="${x1}" y2="${DIM_ROW3}" stroke="${C_CC}" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
        <line x1="${x2}" y1="${beltY}" x2="${x2}" y2="${DIM_ROW3}" stroke="${C_CC}" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
      `;
      row3 += arrowLine(x1, x2, DIM_ROW3, fmt(ccVal) + ' mm', C_CC);
    }
  }

  // ── Center line of belt (subtle) ──
  const centerLine = `
    <line x1="${beltCx}" y1="${beltY}" x2="${beltCx}" y2="${beltY + beltH}"
          stroke="#93A9B8" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
  `;

  // ── Legend ──
  const legendY = SVG_H - 14;
  const legend = numGuides > 1 ? `
    <circle cx="${beltX + 8}" cy="${legendY}" r="4" fill="${C_KTK}"/>
    <text x="${beltX + 16}" y="${legendY + 4}" font-family="IBM Plex Mono,monospace" font-size="9" fill="${C_KTK}">Kant til kant</text>
    <circle cx="${beltX + 110}" cy="${legendY}" r="4" fill="${C_CC}"/>
    <text x="${beltX + 118}" y="${legendY + 4}" font-family="IBM Plex Mono,monospace" font-size="9" fill="${C_CC}">Center / Center</text>
  ` : '';

  const svg = `<svg width="${SVG_W}" height="${SVG_H}" xmlns="http://www.w3.org/2000/svg">
    ${beltParts}
    ${centerLine}
    ${guides}
    ${topDim}
    ${guideWidthAnnot}
    ${row1}
    ${ktkLabel}${row2}
    ${ccLabel}${row3}
    ${legend}
  </svg>`;

  wrap.innerHTML = svg;
}

// ── Table ────────────────────────────────────────────────────────────────────
function renderTable(beltWidth, numGuides, guideWidth, ccVal, guideCenters, valid, overlap) {
  const tableWrap = document.getElementById('tableWrap');
  const status = (!valid || overlap)
    ? `<span class="badge warn">Advarsel</span>`
    : `<span class="badge ok">OK</span>`;

  let rows = '';

  // Belt edge → first guide left edge
  const edgeToFirst = guideCenters[0] - guideWidth / 2;
  rows += `<tr><td>Båndkant → Styreliste 1 (venstre kant)</td><td>${fmt(edgeToFirst)} mm</td></tr>`;

  if (numGuides > 1) {
    // For each pair: kant-til-kant + C/C
    for (let i = 0; i < guideCenters.length - 1; i++) {
      const ktk = guideCenters[i + 1] - guideCenters[i] - guideWidth;
      const cc  = guideCenters[i + 1] - guideCenters[i];
      const pairLabel = numGuides === 2
        ? ''
        : ` (${i+1}→${i+2})`;

      rows += `<tr class="highlight"><td>Kant til kant${pairLabel}</td><td>${fmt(ktk)} mm</td></tr>`;
      rows += `<tr><td>C/C${pairLabel}</td><td>${fmt(cc)} mm</td></tr>`;
    }
  } else {
    // Single guide
    rows += `<tr><td>Styreliste centerposition</td><td>${fmt(guideCenters[0])} mm</td></tr>`;
  }

  // Last guide right edge → belt end
  const lastToEdge = beltWidth - guideCenters[guideCenters.length - 1] - guideWidth / 2;
  rows += `<tr><td>Styreliste ${numGuides} (højre kant) → Båndkant</td><td>${fmt(lastToEdge)} mm</td></tr>`;

  // Guide width
  rows += `<tr><td>Styrelistebredde</td><td>${fmt(guideWidth)} mm</td></tr>`;

  // Total belt width
  rows += `<tr><td>Båndbredde</td><td>${fmt(beltWidth)} mm</td></tr>`;

  // Overlap check
  if (overlap) {
    rows += `<tr class="warn"><td colspan="2">⚠ Styrelister overlapper hinanden</td></tr>`;
  }
  if (!valid) {
    rows += `<tr class="warn"><td colspan="2">⚠ Styreliste(r) rager uden for båndet</td></tr>`;
  }

  tableWrap.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <span class="table-section-title" style="margin:0;border:none;padding:0">Mål</span>
      ${status}
    </div>
    <table class="measurements-table">
      <thead><tr><th>Beskrivelse</th><th style="text-align:right">Værdi</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="font-size:0.62rem;color:var(--muted);margin-top:4px">
      Fremhævet = kant til kant &nbsp;|&nbsp; Almindelig = C/C
    </div>
  `;
}

// ── Print ────────────────────────────────────────────────────────────────────
function doPrint() { window.print(); }

// ── Format ───────────────────────────────────────────────────────────────────
function fmt(n) {
  if (isNaN(n)) return '—';
  const r = parseFloat(n.toFixed(3));
  return r % 1 === 0 ? r.toString() : r.toString();
}

// ── Enter key ────────────────────────────────────────────────────────────────
document.querySelectorAll('input').forEach(el =>
  el.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); })
);
</script>
