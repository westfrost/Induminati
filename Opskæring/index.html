<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opskæringskalkulator — Induminati</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
  :root {
    --steel:#005F7F; --rust:#00A0C0; --smoke:#F0F6F8; --light:#FAFCFD;
    --border:#C8DDE4; --text:#1A3A4A; --muted:#5A7A88;
    --green:#2E7D32; --green-bg:#E8F5E9;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--smoke);color:var(--text);min-height:100vh}
  header{background:var(--steel);padding:18px 28px;display:flex;align-items:center;gap:14px}
  header .logo{width:34px;height:34px;background:var(--rust);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  header .logo svg{width:20px;height:20px}
  header h1{font-size:16px;font-weight:600;color:#fff;flex:1}
  header span{font-size:12px;color:#8A9BB0;font-family:'DM Mono',monospace;margin-left:4px}
  .btn-home{color:#8A9BB0;text-decoration:none;font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;white-space:nowrap;padding:6px 10px;border:1px solid #2e4a63;border-radius:5px;transition:color .15s,border-color .15s}
  .btn-home:hover{color:#fff;border-color:#8A9BB0}
  main{max-width:820px;margin:0 auto;padding:28px 18px 60px;display:flex;flex-direction:column;gap:22px}
  .card{background:var(--light);border:1px solid var(--border);border-radius:8px;padding:22px}
  .card h2{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
  .input-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:100px}
  .field label{font-size:11px;font-weight:500;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em}
  .field input{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;padding:9px 11px;border:1.5px solid var(--border);border-radius:5px;background:var(--smoke);color:var(--text);outline:none;transition:border-color .15s,background .15s;width:100%}
  .field input:focus{border-color:var(--rust);background:#fff}
  .sep{font-size:18px;color:var(--muted);padding-bottom:8px;align-self:flex-end}
  .col-labels{display:flex;gap:8px;margin-bottom:6px}
  .col-labels span{font-size:10px;font-weight:600;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;flex:1}
  .col-labels span.col-qty{max-width:68px}
  .col-labels span.col-del{width:34px;flex:none}
  .band-list{display:flex;flex-direction:column;gap:7px}
  .band-row{display:flex;gap:8px;align-items:center;animation:fadeIn .15s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .band-row .field{flex:1}
  .band-row .field.f-qty{max-width:68px}
  .band-row .field label{display:none}
  .btn-del{width:34px;height:38px;flex-shrink:0;border:1.5px solid var(--border);border-radius:5px;background:transparent;color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,color .15s,background .15s}
  .btn-del:hover{border-color:var(--rust);color:var(--rust);background:#FDF3EF}
  .btn-add{margin-top:10px;width:100%;display:flex;align-items:center;justify-content:center;gap:7px;background:none;border:1.5px dashed var(--border);border-radius:5px;padding:9px 14px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:border-color .15s,color .15s}
  .btn-add:hover{border-color:var(--rust);color:var(--rust)}
  .btn-calc{background:var(--rust);color:#fff;border:none;border-radius:6px;padding:13px 28px;font-size:15px;font-weight:600;cursor:pointer;align-self:flex-start;transition:background .15s,transform .1s}
  .btn-calc:hover{background:#b04419}
  .btn-calc:active{transform:scale(.98)}
  .error-box{background:#FDF3EF;border:1.5px solid var(--rust);border-radius:6px;padding:12px 16px;font-size:14px;color:var(--rust);font-weight:500;display:none}
  #result{display:none;flex-direction:column;gap:22px}
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
  .sum-card{background:var(--smoke);border:1px solid var(--border);border-radius:6px;padding:13px 15px}
  .sum-card.green{background:var(--green-bg);border-color:#A5D6A7}
  .sum-card .sc-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:4px}
  .sum-card.green .sc-lbl{color:var(--green)}
  .sum-card .sc-val{font-family:'DM Mono',monospace;font-size:17px;font-weight:500}
  .sum-card.green .sc-val{color:var(--green)}
  .sum-card .sc-sub{font-size:11px;color:var(--muted);margin-top:2px}
  .steps{display:flex;flex-direction:column;gap:9px}
  .step{display:flex;gap:13px;align-items:flex-start;background:var(--smoke);border:1px solid var(--border);border-radius:6px;padding:13px 15px}
  .step-num{background:var(--steel);color:#fff;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;border-radius:4px;min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .step-body{flex:1}
  .step-title{font-size:14px;font-weight:600;margin-bottom:3px}
  .step-detail{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);line-height:1.6}
  .step-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{background:#fff;border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-family:'DM Mono',monospace;font-size:12px}
  .tag.rest{background:#FFF8ED;border-color:#E0C8A0;color:#7A5A18}
  .tag.dorn-action{background:#E6F4F7;border-color:#00A0C0;color:#005F7F;font-weight:600}
  .step-dorn{border-color:#00A0C0;background:#E6F4F7}
  .step-dorn .step-num{background:#00A0C0}
  .canvas-wrap{background:var(--smoke);border:1px solid var(--border);border-radius:6px;padding:14px;overflow-x:auto}
  canvas{display:block}

  /* Print button */
  .btn-print{background:var(--steel);color:#fff;border:none;border-radius:6px;padding:13px 28px;font-size:15px;font-weight:600;cursor:pointer;display:none;align-items:center;gap:8px;transition:background .15s}
  .btn-print:hover{background:#2e4a63}
  #result.ready .btn-print{display:inline-flex}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap}

  /* Order / description fields */
  .field input[type=text]{font-family:'DM Mono',monospace;font-size:13px;font-weight:400;padding:9px 11px;border:1.5px solid var(--border);border-radius:5px;background:var(--smoke);color:var(--text);outline:none;transition:border-color .15s,background .15s;width:100%}
  .field input[type=text]:focus{border-color:var(--rust);background:#fff}

  /* History */
  .history-list{display:flex;flex-direction:column;gap:8px}
  .hist-item{background:var(--smoke);border:1px solid var(--border);border-radius:6px;padding:11px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
  .hist-item:hover{border-color:var(--rust)}
  .hist-meta{flex:1}
  .hist-title{font-size:13px;font-weight:600;font-family:'DM Mono',monospace}
  .hist-sub{font-size:11px;color:var(--muted);margin-top:2px}
  .hist-del{width:28px;height:28px;border:1.5px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s,color .15s}
  .hist-del:hover{border-color:var(--rust);color:var(--rust)}
  .hist-empty{font-size:12px;color:var(--muted);text-align:center;padding:18px 0;font-family:'DM Mono',monospace}
  .btn-clear-hist{background:none;border:1.5px solid var(--border);border-radius:5px;padding:6px 14px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:border-color .15s,color .15s}
  .btn-clear-hist:hover{border-color:var(--rust);color:var(--rust)}
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg viewBox="0 0 20 20" fill="none">
      <rect x="1" y="7" width="18" height="6" rx="3" fill="white" opacity="0.9"/>
      <circle cx="4" cy="10" r="2.5" fill="white"/>
      <circle cx="16" cy="10" r="2.5" fill="white"/>
      <rect x="3" y="9" width="14" height="2" fill="#00A0C0"/>
    </svg>
  </div>
  <h1>Opskæringskalkulator <span>Induminati</span></h1>
  <a class="btn-home" href="../index.html">← Forside</a>
</header>
<main>
  <div class="card">
    <h2>Moderrulle</h2>
    <div class="input-row">
      <div class="field"><label>Bredde</label><input type="number" id="mr-b" min="1" placeholder="Bredde mm"></div>
      <div class="sep">×</div>
      <div class="field"><label>Længde</label><input type="number" id="mr-l" min="1" placeholder="Længde mm"></div>
    </div>
  </div>
  <div class="card">
    <h2>Buffer — tillæg per bånd</h2>
    <div class="input-row">
      <div class="field" style="max-width:180px"><label>Buffer</label><input type="number" id="buffer" min="0" placeholder="Buffer mm"></div>
      <div class="field" style="max-width:220px"><label>Maks antal strimler (valgfrit)</label><input type="number" id="max-strimler" min="1" placeholder="Ingen begrænsning"></div>
    </div>
  </div>
  <div class="card">
    <h2>Dorn — pak bånd i bredden</h2>
    <div class="input-row">
      <div class="field" style="max-width:220px">
        <label>Skæretillæg pr. dorn</label>
        <input type="number" id="dorn-tillæg" min="0" placeholder="fx 10 mm">
      </div>
    </div>
  </div>
  <div class="card">
    <h2>Ordre / Reference</h2>
    <div class="input-row">
      <div class="field">
        <label>Ordrenummer / Kunde</label>
        <input type="text" id="order-ref" placeholder="fx 12345 / Navn">
      </div>
      <div class="field">
        <label>Note (valgfrit)</label>
        <input type="text" id="order-note" placeholder="fx Lager, Navn">
      </div>
    </div>
  </div>
  <div class="card">
    <h2>Bånd der skal skæres</h2>
    <div class="col-labels">
      <span class="col-qty">Antal</span>
      <span>Bredde mm</span>
      <span>Længde mm</span>
      <span class="col-del"></span>
    </div>
    <div class="band-list" id="band-list"></div>
    <button class="btn-add" id="btn-add">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      Tilføj linje
    </button>
  </div>
  <div class="error-box" id="error-box"></div>
  <div class="btn-row">
    <button class="btn-calc" id="btn-calc">Beregn opskæring</button>
  </div>
  <div id="result">
    <div class="card"><h2>Oversigt</h2><div class="summary-grid" id="summary-grid"></div></div>
    <div class="card"><h2>Opskæringsplan</h2><div class="steps" id="steps"></div></div>
    <div class="card"><h2>Visuel oversigt</h2><div class="canvas-wrap"><canvas id="vis"></canvas></div></div>
    <button class="btn-print" id="btn-print">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M3 5V1h9v4M3 11H1V6h13v5h-2M3 9h9v5H3z" stroke="white" stroke-width="1.4" stroke-linejoin="round"/></svg>
      Udskriv arbejdsseddel
    </button>
  </div>
  <div class="card" id="history-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)">
      <h2 style="margin:0;padding:0;border:none">Gemte beregninger</h2>
      <button class="btn-clear-hist" onclick="clearHistory()">Ryd alt</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>
</main>
<script>
// ── Band rows ─────────────────────────────────────────────────────────────────
const bandList = document.getElementById('band-list');

function addRow() {
  const row = document.createElement('div');
  row.className = 'band-row';
  row.innerHTML = `
    <div class="field f-qty"><label>Antal</label><input type="number" class="r-qty" min="1" placeholder="Antal"></div>
    <div class="field"><label>Bredde</label><input type="number" class="r-b" min="1" placeholder="Bredde mm"></div>
    <div class="field"><label>Længde</label><input type="number" class="r-l" min="1" placeholder="Længde mm"></div>
    <button class="btn-del" title="Fjern">×</button>
  `;
  row.querySelector('.btn-del').addEventListener('click', () => {
    if (bandList.children.length > 1) row.remove();
  });
  // Tab on last input → add new row
  row.querySelector('.r-l').addEventListener('keydown', e => {
    if (e.key === 'Tab' && !e.shiftKey) {
      e.preventDefault();
      addRow();
    }
  });
  bandList.appendChild(row);
  row.querySelector('input').focus();
}

document.getElementById('btn-add').addEventListener('click', addRow);
document.getElementById('btn-print').addEventListener('click', () => { if (_printData) openPrintWindow(_printData); });
addRow();

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmt = n => Number(n).toLocaleString('da-DK');

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('result').style.display = 'none';
}
function clearError() { document.getElementById('error-box').style.display = 'none'; }

function readBands() {
  const out = [];
  bandList.querySelectorAll('.band-row').forEach(r => {
    const qty = parseInt(r.querySelector('.r-qty').value);
    const b   = parseFloat(r.querySelector('.r-b').value);
    const l   = parseFloat(r.querySelector('.r-l').value);
    if (!isNaN(qty) && qty >= 1 && !isNaN(b) && b > 0 && !isNaN(l) && l > 0)
      for (let i = 0; i < qty; i++) out.push({ b, origL: l });
  });
  return out;
}

// ── Algorithm: minimise cutLen ────────────────────────────────────────────────
//
// Objective: distribute bands of same width across K strimler so that
// the LONGEST strimmel is as SHORT as possible (= minimise cutLen).
// We try K = 1, 2, 3, ... and for each K binary-search the minimum
// achievable max-bin-length. We pick the K that gives the globally
// shortest cutLen (more strimler = shorter cutLen, but uses more width).
// We stop when adding more strimler no longer improves cutLen.

// Can we fit `sorted` (desc) into K bins each with capacity `cap`?
function canFit(sorted, K, cap) {
  if (sorted[0] > cap) return false;
  const bins = new Array(K).fill(0);
  for (const x of sorted) {
    // Find bin with most load that still fits x (best-fit descending)
    let best = -1;
    for (let i = 0; i < K; i++) {
      if (bins[i] + x <= cap) {
        if (best === -1 || bins[i] > bins[best]) best = i;
      }
    }
    if (best === -1) return false;
    bins[best] += x;
  }
  return true;
}

// Minimum achievable max-bin-length for exactly K bins
function minMaxForK(sorted, K, mrL) {
  const total = sorted.reduce((a, b) => a + b, 0);
  let lo = sorted[0];           // can't be less than the biggest item
  let hi = Math.min(total, mrL);
  if (!canFit(sorted, K, hi)) return Infinity;
  while (lo < hi) {
    const mid = Math.floor((lo + hi) / 2);
    if (canFit(sorted, K, mid)) hi = mid;
    else lo = mid + 1;
  }
  return lo;
}

// Reconstruct bin assignment for a given K and cap
function assignBins(sorted, K, cap) {
  const bins = new Array(K).fill(0);
  const binItems = Array.from({ length: K }, () => []);
  for (const x of sorted) {
    let best = -1;
    for (let i = 0; i < K; i++) {
      if (bins[i] + x <= cap) {
        if (best === -1 || bins[i] > bins[best]) best = i;
      }
    }
    bins[best] += x;
    binItems[best].push(x);
  }
  return binItems.filter(b => b.length > 0);
}

// Solve for one width-group: find K and assignment that minimises cutLen
function solveGroup(lengths, mrL, mrB, width, maxKOverride) {
  const n = lengths.length;
  const sorted = [...lengths].sort((a, b) => b - a);
  const maxKByWidth = Math.floor(mrB / width);
  const maxK = maxKOverride ? Math.min(maxKOverride, maxKByWidth, n) : Math.min(maxKByWidth, n);

  let bestCutLen = Infinity;
  let bestK = 1;

  for (let K = 1; K <= maxK; K++) {
    const cutLen = minMaxForK(sorted, K, mrL);
    if (cutLen < bestCutLen) {
      bestCutLen = cutLen;
      bestK = K;
    }
    // Once cutLen equals the largest single item, adding more K won't help
    if (bestCutLen <= sorted[0]) break;
  }

  const binItems = assignBins(sorted, bestK, bestCutLen);
  return { cutLen: bestCutLen, bins: binItems };
}

// ── Calculate ─────────────────────────────────────────────────────────────────
document.getElementById('btn-calc').addEventListener('click', calculate);

function calculate() {
  clearError();

  const mrB    = parseFloat(document.getElementById('mr-b').value);
  const mrL    = parseFloat(document.getElementById('mr-l').value);
  const buffer = parseFloat(document.getElementById('buffer').value) || 0;
  const maxStrimlerInput = parseInt(document.getElementById('max-strimler').value);
  const maxStrimlerTotal = isNaN(maxStrimlerInput) || maxStrimlerInput < 1 ? null : maxStrimlerInput;
  if (isNaN(mrB) || mrB <= 0 || isNaN(mrL) || mrL <= 0) {
    showError('Angiv gyldige mål for moderrullen (bredde og længde).'); return;
  }

  const rawBands = readBands();
  if (rawBands.length === 0) {
    showError('Udfyld mindst ét bånd med antal, bredde og længde.'); return;
  }

  // Apply buffer
  const bands = rawBands.map(b => ({ b: b.b, origL: b.origL, l: b.origL + buffer }));

  // ── Dorn settings ──
  const DORN_MAX_L  = 5500; // hardcoded
  const dornTillæg  = parseFloat(document.getElementById('dorn-tillæg').value) || 0;

  // ── Dorn packing ──
  // Rule: bands with identical width AND identical origL AND origL <= 5500
  // are candidates for packing into a dorn.
  //
  // A dorn packs N bands side by side: dornWidth = N * bandWidth + dornTillæg
  //
  // If dornWidth <= mrB: one dorn, treated as a single strimmel.
  // If dornWidth > mrB: split into multiple dorns of equal size (as even as possible),
  //   each fitting within mrB. Each dorn is placed sequentially in LENGTH
  //   (forskudt/offset), so total length used = numDorns * dornLength.
  //
  // Bands with origL > 5500 are left as normal strimler.

  const dornGroups = {};
  const normalBands = [];

  for (const band of bands) {
    if (band.origL <= DORN_MAX_L) {
      const key = `${band.origL}__${band.b}`;
      if (!dornGroups[key]) dornGroups[key] = [];
      dornGroups[key].push(band);
    } else {
      normalBands.push(band);
    }
  }

  // resolvedBands = normal bands + dorn placeholders
  // Each dorn placeholder = { b, origL, l, isDorn, dornPieces, dornTillæg, dornSplit }
  // dornSplit: how many dorns this group was split into (for length-offset rendering)
  const resolvedBands = [...normalBands];

  for (const [key, group] of Object.entries(dornGroups)) {
    if (group.length < 2) {
      // Single band of this exact size — normal
      resolvedBands.push(group[0]);
      continue;
    }

    const bandW   = group[0].b;
    const bandL   = group[0].l;    // with buffer
    const origL   = group[0].origL;
    const n       = group.length;

    // Find how many bands fit per dorn within mrB
    // bandsPerDorn = max k such that k*bandW + dornTillæg <= mrB
    const maxPerDorn = Math.floor((mrB - dornTillæg) / bandW);

    if (maxPerDorn < 1) {
      // Even a single band + tillæg > mrB — impossible, treat as normal bands
      group.forEach(b => resolvedBands.push(b));
      continue;
    }

    // Number of dorns needed
    const numDorns = Math.ceil(n / maxPerDorn);

    // Distribute bands as evenly as possible across dorns
    for (let d = 0; d < numDorns; d++) {
      const start = d * maxPerDorn;
      const end   = Math.min(start + maxPerDorn, n);
      const slice = group.slice(start, end);
      const dornW = slice.length * bandW + dornTillæg;

      resolvedBands.push({
        b:          dornW,
        origL:      origL,
        l:          bandL,
        isDorn:     true,
        dornPieces: slice,
        dornTillæg: dornTillæg,
        dornIndex:  d,          // which dorn in the sequence
        numDorns:   numDorns,   // total dorns for this group
        dornKey:    key         // links dorns of same group
      });
    }
  }

  // Validate: only check length, never width (width handled by dorn splitting)
  for (const band of resolvedBands) {
    if (band.l > mrL) {
      showError(`Bånd/dorn ${fmt(band.b)} × ${fmt(band.origL)} mm + buffer ${fmt(buffer)} mm = ${fmt(band.l)} mm — overskrider moderrullens længde på ${fmt(mrL)} mm.`);
      return;
    }
  }

  // For multi-split dorns: each dorn in the same group occupies length sequentially.
  // We model this by giving each dorn a "lengthOffset" = dornIndex * dornLength,
  // and treat them as separate strimler all of the SAME width stacked in length.
  // Actually: they are placed one after another in LENGTH on the same WIDTH position.
  // So we represent them as a single strimmel with totalLen = numDorns * dornLength,
  // containing all dorn slices as sub-pieces.

  // Merge multi-split dorns back into one strimmel entry
  const mergedDorns = {};
  const singleBands = [];

  for (const band of resolvedBands) {
    if (band.isDorn && band.numDorns > 1) {
      const k = band.dornKey;
      if (!mergedDorns[k]) mergedDorns[k] = { slices: [], band };
      mergedDorns[k].slices.push(band);
    } else {
      singleBands.push(band);
    }
  }

  const finalBands = [...singleBands];
  for (const { slices, band } of Object.values(mergedDorns)) {
    // One strimmel of width = max dorn width in group, length = sum of all dorn lengths
    const maxW    = Math.max(...slices.map(s => s.b));
    const totalL  = slices.reduce((s, x) => s + x.l, 0);
    finalBands.push({
      b:           maxW,
      origL:       band.origL,
      l:           totalL,
      isDorn:      true,
      isDornMulti: true,
      dornSlices:  slices,
      dornTillæg:  band.dornTillæg
    });
  }

  // Group by width
  const groups = {};
  finalBands.forEach(b => {
    if (!groups[b.b]) groups[b.b] = [];
    groups[b.b].push(b);
  });

  // Solve each group
  const allStrimler = [];
  let totalWidth = 0;

  for (const [widthStr, items] of Object.entries(groups)) {
    const width = parseFloat(widthStr);
    const lengths = items.map(x => x.l);
    const isDornGroup = items.some(x => x.isDorn);
    const availW = isDornGroup ? mrB : mrB - totalWidth;
    const { bins } = solveGroup(lengths, mrL, availW, width, maxStrimlerTotal);

    // Map bin lengths back to original band objects
    // Build a pool sorted descending to match how bins were built
    let pool = [...items].sort((a, b) => b.l - a.l);

    for (const bin of bins) {
      const pieces = [];
      for (const len of bin) {
        const idx = pool.findIndex(x => x.l === len);
        if (idx !== -1) { pieces.push(pool[idx]); pool.splice(idx, 1); }
      }
      const totalLen  = pieces.reduce((s, p) => s + p.l, 0);
      const isDorn    = pieces.length === 1 && pieces[0].isDorn;
      const isDornMulti = isDorn && pieces[0].isDornMulti;
      allStrimler.push({ width, totalLen, pieces, isDorn, isDornMulti });
      totalWidth += width;
    }

    if (totalWidth > mrB) {
      // Only error if this is NOT a dorn (dorns are pre-split to fit)
      const lastStrimmel = allStrimler[allStrimler.length - 1];
      if (!lastStrimmel || !lastStrimmel.isDorn) {
        showError(`Samlet bredde (${fmt(totalWidth)} mm) overskrider moderrullens bredde (${fmt(mrB)} mm).`);
        return;
      }
    }
  }

  // cutLen = longest strimmel across all groups
  // For multi-dorns stacked in length, their width is counted once (they share position)
  const cutLen = Math.max(...allStrimler.map(s => s.totalLen));

  // Recalculate real total width (multi-dorns only occupy one width slot)
  const realTotalWidth = allStrimler.reduce((s, st) => s + st.width, 0);

  const restRulle = { b: mrB, l: mrL - cutLen };
  const sideRest  = { b: mrB - Math.min(realTotalWidth, mrB), l: cutLen };

  const orderRef  = document.getElementById('order-ref').value.trim();
  const orderNote = document.getElementById('order-note').value.trim();
  renderResult({ mrB, mrL, buffer, strimler: allStrimler, cutLen, totalWidth: Math.min(realTotalWidth, mrB), restRulle, sideRest, orderRef, orderNote });
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderResult(d) {
  const res = document.getElementById('result');
  res.style.display = 'flex';

  // Summary
  // Show order ref in result header if present
  if (d.orderRef) {
    document.querySelector('#result .card h2').textContent = 'Oversigt — ' + d.orderRef;
  }
  const sg = document.getElementById('summary-grid');
  sg.innerHTML = '';
  [
    { lbl: 'Antal strimler', val: String(d.strimler.length), sub: 'på langs af rullen' },
    { lbl: 'Opskæret stykke', val: `${fmt(d.totalWidth)} × ${fmt(d.cutLen)} mm`, sub: 'bredde × længde' },
    { lbl: 'Siderest i opskæret stykke', val: d.sideRest.b > 0 ? `${fmt(d.sideRest.b)} × ${fmt(d.sideRest.l)} mm` : '—', sub: d.sideRest.b > 0 ? 'bredde × længde' : '' },
    { lbl: 'Tilbage som moderrulle', val: `${fmt(d.restRulle.b)} × ${fmt(d.restRulle.l)} mm`, sub: 'bredde × længde', green: true },
  ].forEach(item => {
    const el = document.createElement('div');
    el.className = 'sum-card' + (item.green ? ' green' : '');
    el.innerHTML = `<div class="sc-lbl">${item.lbl}</div><div class="sc-val">${item.val}</div>${item.sub ? `<div class="sc-sub">${item.sub}</div>` : ''}`;
    sg.appendChild(el);
  });

  // Steps
  const st = document.getElementById('steps');
  st.innerHTML = '';
  let n = 1;
  let usedWidth = 0;
  d.strimler.forEach((s, i) => {
    let tags, title, detail;

    if (s.isDorn && s.isDornMulti) {
      // Multiple dorns stacked in length
      const slices   = s.pieces[0].dornSlices;
      const numD     = slices.length;
      const bandW    = slices[0].dornPieces[0].b;
      const perDorn  = slices[0].dornPieces.length;
      title  = `Strimmel ${i+1} — DORN ×${numD}:  ${fmt(s.width)} mm bred,  ${fmt(s.totalLen)} mm lang`;
      detail = `Position ${fmt(usedWidth)} – ${fmt(usedWidth + s.width)} mm.\n${numD} dorner à ${perDorn} bånd af ${fmt(bandW)} mm, skåret forskudt i længden.`;
      tags = slices.map((sl, si) =>
        `Dorn ${si+1}: ${sl.dornPieces.length} × ${fmt(bandW)} mm  (pos ${fmt(si * sl.l)}–${fmt((si+1) * sl.l)} mm)`
      );
      tags.push(`→ Skær hver dorn op i ${perDorn} strimler à ${fmt(bandW)} mm`);

    } else if (s.isDorn) {
      // Single dorn
      const piece    = s.pieces[0];
      const bandW    = piece.dornPieces[0].b;
      const numBands = piece.dornPieces.length;
      title  = `Strimmel ${i+1} — DORN:  ${fmt(s.width)} mm bred,  ${fmt(s.totalLen)} mm lang`;
      detail = `Position ${fmt(usedWidth)} – ${fmt(usedWidth + s.width)} mm.  ${numBands} bånd à ${fmt(bandW)} mm + ${fmt(piece.dornTillæg)} mm tillæg.`;
      tags = piece.dornPieces.map((p, pi) => `Bånd ${pi+1}: ${fmt(p.b)} × ${fmt(p.origL)} mm`);
      tags.push(`→ Skær op i ${numBands} strimler à ${fmt(bandW)} mm`);

    } else {
      title  = `Strimmel ${i+1} — ${fmt(s.width)} mm bred,  ${fmt(s.totalLen)} mm lang`;
      detail = `Position ${fmt(usedWidth)} – ${fmt(usedWidth + s.width)} mm.  ${s.pieces.length} bånd i denne strimmel.`;
      tags = s.pieces.map(p =>
        `${fmt(s.width)} × ${fmt(p.origL)} mm  (+${fmt(d.buffer)} → ${fmt(p.l)} mm)`
      );
    }

    if (s.totalLen < d.cutLen)
      tags.push(`REST: ${fmt(s.width)} × ${fmt(d.cutLen - s.totalLen)} mm`);

    addStep(st, n++, title, detail, tags, s.isDorn);
    usedWidth += s.width;
  });

  if (d.sideRest.b > 0)
    addStep(st, n++,
      `Siderest — ${fmt(d.sideRest.b)} × ${fmt(d.sideRest.l)} mm`,
      `Position ${fmt(usedWidth)} – ${fmt(d.mrB)} mm er ubrugt i det afskårne stykke.`,
      []
    );

  drawCanvas(d);
  _printData = d;
  saveToHistory(d);
  document.getElementById('result').classList.add('ready');
  res.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function addStep(container, num, title, detail, tags, isDorn) {
  const div = document.createElement('div');
  div.className = 'step' + (isDorn ? ' step-dorn' : '');
  const tagHTML = tags.map(t => {
    const isRest = t.startsWith('REST:');
    const isDornTag = t.startsWith('→');
    return `<span class="tag${isRest ? ' rest' : isDornTag ? ' dorn-action' : ''}">${t}</span>`;
  }).join('');
  div.innerHTML = `
    <div class="step-num">${num}</div>
    <div class="step-body">
      <div class="step-title">${title}</div>
      <div class="step-detail">${detail.replace(/\n/g, '<br>')}</div>
      ${tagHTML ? `<div class="step-tags">${tagHTML}</div>` : ''}
    </div>
  `;
  container.appendChild(div);
}

// ── Print window ──────────────────────────────────────────────────────────────
function buildPrintCanvas(d) {
  const W = 1200;
  const scaleW = W / d.mrB;
  const H = Math.max(80, Math.round(W * 0.12));
  const scaleL = H / d.cutLen;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  const COLORS = ['#C94F1E','#1565C0','#2E7D32','#6A1B9A','#00695C','#E65100','#0277BD','#558B2F'];
  ctx.fillStyle = '#E8E4DE';
  ctx.fillRect(0, 0, W, H);
  let xOff = 0;
  d.strimler.forEach((s, i) => {
    const sw = s.width * scaleW;
    const sh = s.totalLen * scaleL;
    const col = COLORS[i % COLORS.length];
    ctx.fillStyle = hexA(col, 0.18); ctx.fillRect(xOff, 0, sw, H);
    ctx.fillStyle = hexA(col, 0.7);  ctx.fillRect(xOff, 0, sw, sh);
    ctx.strokeStyle = hexA(col, 0.9); ctx.lineWidth = 1.5;
    ctx.strokeRect(xOff + 0.5, 0.5, sw - 1, sh - 1);
    if (sw > 30 && sh > 14) {
      const fs = clamp(9, sw / 8, 14);
      ctx.save();
      ctx.font = `700 ${fs}px Arial,sans-serif`;
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(`${fmt(s.width)} mm`, xOff + sw/2, sh/2 - fs*0.6);
      ctx.font = `${clamp(8,fs*0.85,12)}px Arial,monospace`;
      ctx.fillText(`${fmt(s.totalLen)} mm`, xOff + sw/2, sh/2 + fs*0.7);
      ctx.restore();
    }
    xOff += sw;
  });
  if (d.sideRest.b > 0) {
    const rw = d.sideRest.b * scaleW;
    ctx.fillStyle = 'rgba(150,140,130,0.2)';
    ctx.fillRect(xOff, 0, rw, H);
    if (rw > 40) {
      ctx.save(); ctx.font = '12px Arial,sans-serif'; ctx.fillStyle = '#aaa';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('Siderest', xOff + rw/2, H/2); ctx.restore();
    }
  }
  ctx.strokeStyle = '#999'; ctx.lineWidth = 1.5;
  ctx.strokeRect(0.5, 0.5, W-1, H-1);
  return c.toDataURL('image/png');
}

// ── Canvas (screen) ───────────────────────────────────────────────────────────
function drawCanvas(d) {
  const canvas = document.getElementById('vis');
  const W = Math.min(760, canvas.parentElement.clientWidth - 28);
  const scaleW = W / d.mrB;
  const aspect = Math.min(d.cutLen / d.mrB, 0.35);
  const H = Math.max(60, Math.round(W * aspect));
  const scaleL = H / d.cutLen;

  canvas.width  = W;
  canvas.height = H;

  const ctx = canvas.getContext('2d');
  const COLORS = ['#C94F1E','#1565C0','#2E7D32','#6A1B9A','#00695C','#E65100','#0277BD','#558B2F'];

  // Background = cut piece
  ctx.fillStyle = '#DDD8D0';
  ctx.fillRect(0, 0, W, H);

  let xOff = 0;
  d.strimler.forEach((s, i) => {
    const sw  = s.width * scaleW;
    const sh  = s.totalLen * scaleL;
    const col = COLORS[i % COLORS.length];

    // Tint for full cut zone height (length-rest)
    ctx.fillStyle = hexA(col, 0.15);
    ctx.fillRect(xOff, 0, sw, H);

    // Solid for actual band usage
    ctx.fillStyle = hexA(col, 0.65);
    ctx.fillRect(xOff, 0, sw, sh);

    // Border
    ctx.strokeStyle = hexA(col, 0.85);
    ctx.lineWidth = 1;
    ctx.strokeRect(xOff + 0.5, 0.5, sw - 1, sh - 1);

    // Label
    if (sw >= 22 && sh >= 18) {
      ctx.save();
      const fs = clamp(8, sw / 5, 12);
      ctx.font = `600 ${fs}px Inter,sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`${fmt(s.width)}`, xOff + sw / 2, sh / 2 - fs * 0.7);
      ctx.font = `${clamp(7, sw / 6, 10)}px DM Mono,monospace`;
      ctx.fillText(`${fmt(s.totalLen)}`, xOff + sw / 2, sh / 2 + fs * 0.7);
      ctx.restore();
    }
    xOff += sw;
  });

  // Side rest
  if (d.sideRest.b > 0) {
    const rw = d.sideRest.b * scaleW;
    ctx.fillStyle = 'rgba(150,140,130,0.2)';
    ctx.fillRect(xOff, 0, rw, H);
    if (rw >= 20 && H >= 16) {
      ctx.save();
      ctx.font = '10px Inter,sans-serif';
      ctx.fillStyle = '#999';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Siderest', xOff + rw / 2, H / 2);
      ctx.restore();
    }
  }

  // Border
  ctx.strokeStyle = '#AAA49C';
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5, 0.5, W - 1, H - 1);

  // Width label
  if (H > 20) {
    ctx.save();
    ctx.font = '10px DM Mono,monospace';
    ctx.fillStyle = '#666';
    ctx.textAlign = 'center';
    ctx.fillText(`← ${fmt(d.mrB)} mm →`, W / 2, H - 4);
    ctx.restore();
  }
}

// ── History ───────────────────────────────────────────────────────────────────
const HIST_KEY = 'opsk_history';
const HIST_MAX = 15;

function saveToHistory(d) {
  const hist = loadHistory();
  const entry = {
    id:        Date.now(),
    date:      new Date().toLocaleDateString('da-DK', {day:'2-digit',month:'2-digit',year:'numeric'}),
    time:      new Date().toLocaleTimeString('da-DK', {hour:'2-digit',minute:'2-digit'}),
    orderRef:  d.orderRef  || '',
    orderNote: d.orderNote || '',
    mrB:       d.mrB,
    mrL:       d.mrL,
    buffer:    d.buffer,
    cutLen:    d.cutLen,
    restRulle: d.restRulle,
    totalWidth:d.totalWidth,
    strimler:  d.strimler,
    sideRest:  d.sideRest,
    // Store raw band inputs for reload
    bands: readBands().map(b => ({ ...b }))
  };
  hist.unshift(entry);
  if (hist.length > HIST_MAX) hist.length = HIST_MAX;
  localStorage.setItem(HIST_KEY, JSON.stringify(hist));
  renderHistory();
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; }
  catch { return []; }
}

function clearHistory() {
  if (!confirm('Slet hele historikken?')) return;
  localStorage.removeItem(HIST_KEY);
  renderHistory();
}

function deleteHistEntry(id) {
  const hist = loadHistory().filter(e => e.id !== id);
  localStorage.setItem(HIST_KEY, JSON.stringify(hist));
  renderHistory();
}

function loadHistEntry(entry) {
  // Restore order fields
  document.getElementById('order-ref').value  = entry.orderRef  || '';
  document.getElementById('order-note').value = entry.orderNote || '';
  // Restore moderrulle
  document.getElementById('mr-b').value    = entry.mrB;
  document.getElementById('mr-l').value    = entry.mrL;
  document.getElementById('buffer').value  = entry.buffer;
  // Restore bands
  bandList.innerHTML = '';
  (entry.bands || []).forEach(b => {
    addRow();
    const last = bandList.lastElementChild;
    last.querySelector('.r-qty').value  = b.qty || 1;
    last.querySelector('.r-b').value    = b.b;
    last.querySelector('.r-l').value    = b.origL;
  });
  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderHistory() {
  const hist = loadHistory();
  const el   = document.getElementById('history-list');
  if (!hist.length) {
    el.innerHTML = '<div class="hist-empty">Ingen gemte beregninger endnu</div>';
    return;
  }
  el.innerHTML = hist.map(e => {
    const title = e.orderRef ? e.orderRef : `Moderrulle ${fmt(e.mrB)}×${fmt(e.mrL)}`;
    const sub   = `${e.date} ${e.time}  ·  Snit: ${fmt(e.totalWidth)}×${fmt(e.cutLen)} mm  ·  Rest: ${fmt(e.restRulle.b)}×${fmt(e.restRulle.l)} mm${e.orderNote ? '  ·  ' + e.orderNote : ''}`;
    return `
      <div class="hist-item" onclick="loadHistEntry(${JSON.stringify(e).replace(/"/g,'&quot;')})">
        <div class="hist-meta">
          <div class="hist-title">${title}</div>
          <div class="hist-sub">${sub}</div>
        </div>
        <button class="hist-del" onclick="event.stopPropagation();deleteHistEntry(${e.id})" title="Slet">×</button>
      </div>`;
  }).join('');
}

// Init history on load
renderHistory();

function hexA(hex, a) {
  return `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`;
}
function clamp(lo, v, hi) { return Math.max(lo, Math.min(hi, v)); }
